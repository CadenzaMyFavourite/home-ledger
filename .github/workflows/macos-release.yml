name: macOS release verification

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/macos-release.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/macos-release.yml"

permissions:
  contents: read

jobs:
  unsigned-build-and-offline-check:
    name: Build unsigned universal app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: universal-apple-darwin
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm tauri build --target universal-apple-darwin --bundles app,dmg
      - name: Verify bundle identifier and app output
        shell: bash
        run: |
          app_path="src-tauri/target/universal-apple-darwin/release/bundle/macos/HomeLedger.app"
          test -d "$app_path"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app_path/Contents/Info.plist")" = "com.homeledger.app"
          test -n "$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
      - name: Run isolated offline startup smoke test
        shell: bash
        run: bash scripts/macos_offline_smoke.sh

  direct-download-release:
    name: Sign and notarize direct-download release
    if: startsWith(github.ref, 'refs/tags/')
    needs: unsigned-build-and-offline-check
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: universal-apple-darwin
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: HomeLedger ${{ github.ref_name }}
          releaseBody: macOS signed and notarized release
          releaseDraft: true
          prerelease: true
          args: --target universal-apple-darwin
